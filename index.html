<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b0b0f;
        --fg: #e6e6e6;
        --muted: #8a8aa0;
        --elev: #14141c;
        --elev-hi: #1c1c26;
        --border: #2a2a36;
        --active-bg: #23233a;
        --active-border: #3a3a55;
        --tab-close: #6a6a80;
      }
      .theme-light {
        /* Solarized Light */
        --bg: #fdf6e3;
        --fg: #586e75;
        --muted: #93a1a1;
        --elev: #eee8d5;
        --elev-hi: #e3dcc3;
        --border: #d7d0b5;
        --active-bg: #e8dfb8;
        --active-border: #b58900;
        --tab-close: #93a1a1;
      }
      html, body, #root { height: 100%; width: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
      code, pre, .mono, .term-wrap { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace; }
      #root { display: flex; flex-direction: column; }

      .topbar { flex: 0 0 auto; padding: 6px 10px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
      .topbar select, .topbar button { background: var(--elev); color: var(--fg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font: inherit; cursor: pointer; }
      .topbar .spacer { flex: 1; }

      .shell { flex: 1 1 auto; min-height: 0; display: flex; }
      .shell.horizontal { flex-direction: column; }
      .shell.vertical { flex-direction: row; }

      .tabs { display: flex; gap: 4px; align-items: center; }
      .shell.horizontal .tabs-container { flex: 0 0 auto; padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; overflow-x: auto; }
      .shell.horizontal .tabs { flex-direction: row; }
      .shell.vertical .tabs-container { flex: 0 0 auto; width: 180px; padding: 8px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
      .shell.vertical .tabs { flex-direction: column; align-items: stretch; }
      .shell.vertical .tab { max-width: none; }

      .tab { display: flex; gap: 6px; align-items: center; padding: 2px 6px 2px 4px; background: var(--elev); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; user-select: none; max-width: 180px; font-size: 11px; line-height: 1.2; }
      .tab:hover { background: var(--elev-hi); }
      .tab.active { background: var(--active-bg); color: var(--fg); border-color: var(--active-border); }
      .tab.bell { box-shadow: 0 0 0 2px #d97706; }
      .tab-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
      .tab-close { color: var(--tab-close); padding: 0 4px; border-radius: 2px; font-size: 12px; }
      .tab-close:hover { background: var(--border); color: var(--fg); }
      .tab-new { padding: 1px 6px; font-size: 12px; }
      .agent-chip { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; flex: 0 0 auto; }

      .terms { flex: 1 1 auto; min-height: 0; min-width: 0; position: relative; display: flex; }
      .term-wrap { flex: 1 1 auto; min-height: 0; min-width: 0; padding: 8px; background: var(--bg); }
      .empty { margin: auto; color: var(--muted); }

      .icon-btn { display: inline-flex; align-items: center; justify-content: center; padding: 3px 6px; }
      .project-btn { display: inline-flex; align-items: center; gap: 6px; max-width: 260px; padding: 3px 10px; color: var(--fg); }
      .project-btn:hover { background: var(--elev-hi); }
      .project-dot { width: 6px; height: 6px; border-radius: 50%; background: #ff8a4c; display: inline-block; }

      .settings { position: relative; }
      .settings-panel { position: absolute; right: 0; top: 110%; width: 240px; background: var(--elev); border: 1px solid var(--border); border-radius: 8px; padding: 10px; z-index: 20; box-shadow: 0 8px 28px rgba(0,0,0,0.35); display: flex; flex-direction: column; gap: 10px; }
      .settings-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
      .settings-row span { color: var(--fg); }
      .seg { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
      .seg button { border: none; border-radius: 0; padding: 3px 10px; background: transparent; color: var(--muted); }
      .seg button.on { background: var(--active-bg); color: var(--fg); }
      .linkish { background: transparent; border: none; color: #ff8a4c; padding: 0; cursor: pointer; font: inherit; }

      .picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; backdrop-filter: blur(3px); }
      .picker-head { display: flex; align-items: center; justify-content: space-between; }
      .picker-card { width: 460px; max-width: 100%; background: var(--elev); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px 22px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.55); }
      .picker-brand { display: flex; align-items: center; gap: 8px; color: var(--fg); font-weight: 600; letter-spacing: 0.5px; }
      .picker h2 { margin: 8px 0 0; font-size: 18px; font-weight: 600; color: var(--fg); }
      .picker-sub { margin: 0 0 8px; color: var(--muted); font-size: 13px; }
      .picker-primary { align-self: flex-start; padding: 8px 14px; background: #ff8a4c; color: #1a1a0f; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
      .picker-primary:hover { filter: brightness(1.05); }
      .picker-section { margin-top: 10px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
      .picker-list { list-style: none; margin: 4px 0 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
      .picker-list li { display: flex; align-items: center; gap: 4px; }
      .recent-row { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; padding: 6px 8px; background: transparent; border: 1px solid transparent; border-radius: 6px; color: var(--fg); text-align: left; cursor: pointer; }
      .recent-row:hover { background: var(--elev-hi); border-color: var(--border); }
      .recent-name { font-size: 13px; }
      .recent-path { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 380px; }
      .recent-x { background: transparent; border: none; color: var(--tab-close); font-size: 16px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
      .recent-x:hover { background: var(--border); color: var(--fg); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
